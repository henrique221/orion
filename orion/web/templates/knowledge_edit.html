{% extends "base.html" %}
{% block title %}{{ filename }} — Orion{% endblock %}

{% block content %}
<div class="page-wide">
    <div class="editor-header">
        <div class="editor-title-group">
            <a href="/knowledge" class="editor-back">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <div>
                <div class="editor-filename">{{ filename }}</div>
                <div class="editor-path">{% if is_skill %}.claude/skills/{{ filepath }}{% else %}knowledge/{{ filepath }}{% endif %}</div>
            </div>
        </div>
        <div class="editor-actions">
            <button type="button" id="toggle-preview" class="btn btn-ghost">
                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                Preview
            </button>
            <button type="submit" form="editor-form" class="btn btn-primary">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                Save
            </button>
        </div>
    </div>

    <form id="editor-form" action="/knowledge/save/{{ filepath }}" method="post" class="editor-area">
        <textarea name="content" id="editor-textarea" spellcheck="false">{{ content }}</textarea>
        <div id="preview-pane" class="hidden prose"></div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const textarea = document.getElementById('editor-textarea');
    const preview = document.getElementById('preview-pane');
    const toggleBtn = document.getElementById('toggle-preview');
    let previewVisible = false;

    toggleBtn.addEventListener('click', () => {
        previewVisible = !previewVisible;
        preview.classList.toggle('hidden', !previewVisible);
        toggleBtn.querySelector('span, :last-child').textContent;
        const label = toggleBtn.childNodes;
        for (const n of label) {
            if (n.nodeType === 3 && n.textContent.trim()) {
                n.textContent = previewVisible ? ' Editor' : ' Preview';
            }
        }
        if (previewVisible) preview.innerHTML = marked.parse(textarea.value);
    });

    textarea.addEventListener('input', () => {
        if (previewVisible) preview.innerHTML = marked.parse(textarea.value);
    });

    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            document.getElementById('editor-form').submit();
        }
    });
</script>
{% endblock %}
