{% extends "base.html" %}
{% block title %}Orion — Knowledge{% endblock %}

{% block content %}
<div class="page">
    <div style="margin-bottom: 2rem;">
        <div class="page-title">Knowledge Base</div>
        <div class="page-desc">Project documentation and agent skills</div>
    </div>

    <!-- Knowledge files -->
    <div style="margin-bottom: 2rem;">
        <div class="section-label">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
            </svg>
            knowledge/
        </div>
        <div class="file-list">
            {% for file in files %}
            <a href="/knowledge/edit/{{ file.path }}" class="file-item">
                <div class="file-item-left">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    {{ file.name }}
                </div>
                <svg class="file-item-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </a>
            {% endfor %}
        </div>
    </div>

    <!-- Skills -->
    <div>
        <div class="section-label">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            .claude/skills/
        </div>
        <div class="file-list">
            {% for skill in skills %}
            <a href="/knowledge/edit/{{ skill.path }}" class="file-item skill">
                <div class="file-item-left">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                    {{ skill.name }}
                </div>
                <svg class="file-item-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </a>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
